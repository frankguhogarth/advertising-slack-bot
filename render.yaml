services:
  - type: web
    name: advertising-slack-bot
    env: python
    plan: free
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: python src/slack_bot/main.py
    envVars:
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_SIGNING_SECRET
        sync: false
      - key: PORT
        value: "5001"
      - key: COZE_WORKSPACE_PATH
        value: "/opt/render/project"
      - key: PYTHONUNBUFFERED
        value: "1"
